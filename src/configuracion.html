<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Configuración</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #111b21;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #202c33;
            padding: 40px;
            border-radius: 12px;
            width: 420px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        h1 {
            color: white;
            font-size: 1.4rem;
            text-align: center;
        }

        .opcion {
            display: flex;
            align-items: center;
            padding: 16px;
            background-color: #2a3942;
            border-radius: 10px;
            cursor: pointer;
            gap: 16px;
            transition: background 0.2s;
        }

        .opcion:hover {
            background-color: #3d4f58;
        }

        .opcion-icono {
            font-size: 1.5rem;
        }

        .opcion-info {
            flex: 1;
        }

        .opcion-titulo {
            color: #e9edef;
            font-size: 0.95rem;
            font-weight: bold;
        }

        .opcion-desc {
            color: #8696a0;
            font-size: 0.8rem;
            margin-top: 3px;
        }

        .opcion-flecha {
            color: #8696a0;
        }

        .divider {
            width: 100%;
            height: 1px;
            background-color: #2a3942;
        }

        .btn-volver {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #00a884;
            background-color: transparent;
            color: #00a884;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-volver:hover {
            background-color: #2a3942;
        }

        .btn-danger {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background-color: #3d1515;
            color: #ff6b6b;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-danger:hover {
            background-color: #5a1f1f;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⚙️ Configuración</h1>

        <div class="opcion" onclick="window.location.href='perfil.html'">
            <div class="opcion-icono">👤</div>
            <div class="opcion-info">
                <div class="opcion-titulo">Editar perfil</div>
                <div class="opcion-desc">Cambia tu nombre y estado</div>
            </div>
            <div class="opcion-flecha">›</div>
        </div>

        <div class="opcion" onclick="window.location.href='cambiar-contrasena.html'">
            <div class="opcion-icono">🔒</div>
            <div class="opcion-info">
                <div class="opcion-titulo">Cambiar contraseña</div>
                <div class="opcion-desc">Actualiza tu contraseña de acceso</div>
            </div>
            <div class="opcion-flecha">›</div>
        </div>

        <div class="opcion" onclick="toggleModo()">
            <div class="opcion-icono" id="icono-modo">🌙</div>
            <div class="opcion-info">
                <div class="opcion-titulo">Modo oscuro/claro</div>
                <div class="opcion-desc" id="desc-modo">Actualmente: Modo oscuro</div>
            </div>
            <div class="opcion-flecha">›</div>
        </div>

        <div class="divider"></div>

        <button class="btn-volver" onclick="window.location.href='chat.html'">← Volver al chat</button>
        <button class="btn-danger" onclick="cerrarSesion()">🚪 Cerrar sesión</button>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js'
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js'

        const firebaseConfig = {
            apiKey: "AIzaSyCATFZ_YqRufmFkHrMyCyH25kK_0vxUjrA",
            authDomain: "messenger-app-b232a.firebaseapp.com",
            projectId: "messenger-app-b232a",
            storageBucket: "messenger-app-b232a.firebasestorage.app",
            messagingSenderId: "706161001993",
            appId: "1:706161001993:web:708e50c80a51c771e71ad8"
        }

        const app = initializeApp(firebaseConfig)
        const auth = getAuth(app)

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'index.html'
        })

        window.cerrarSesion = async function () {
            await signOut(auth)
            window.location.href = 'index.html'
        }

        window.toggleModo = function () {
            const modo = localStorage.getItem('modo') || 'oscuro'
            if (modo === 'oscuro') {
                localStorage.setItem('modo', 'claro')
                document.getElementById('icono-modo').textContent = '☀️'
                document.getElementById('desc-modo').textContent = 'Actualmente: Modo claro'
                document.body.style.backgroundColor = '#f0f2f5'
                document.querySelectorAll('.opcion').forEach(el => {
                    el.style.backgroundColor = '#ffffff'
                    el.style.color = '#111b21'
                })
                document.querySelectorAll('.opcion-titulo').forEach(el => el.style.color = '#111b21')
                document.querySelectorAll('.opcion-desc').forEach(el => el.style.color = '#667781')
                document.querySelector('.container').style.backgroundColor = '#ffffff'
                document.querySelector('h1').style.color = '#111b21'
            } else {
                localStorage.setItem('modo', 'oscuro')
                document.getElementById('icono-modo').textContent = '🌙'
                document.getElementById('desc-modo').textContent = 'Actualmente: Modo oscuro'
                document.body.style.backgroundColor = '#111b21'
                document.querySelectorAll('.opcion').forEach(el => {
                    el.style.backgroundColor = '#2a3942'
                    el.style.color = '#e9edef'
                })
                document.querySelectorAll('.opcion-titulo').forEach(el => el.style.color = '#e9edef')
                document.querySelectorAll('.opcion-desc').forEach(el => el.style.color = '#8696a0')
                document.querySelector('.container').style.backgroundColor = '#202c33'
                document.querySelector('h1').style.color = '#ffffff'
            }
        }
    </script>
</body>

</html>
