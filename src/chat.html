<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Messenger App - Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #111b21;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* BARRA LATERAL IZQUIERDA (iconos) */
        .sidebar {
            width: 56px;
            background-color: #1a2530;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 8px;
            border-right: 1px solid #2a3942;
        }

        .sidebar-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #00a884;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .sidebar-avatar:hover {
            opacity: 0.85;
        }

        .sidebar-divider {
            width: 32px;
            height: 1px;
            background-color: #2a3942;
            margin: 4px 0;
        }

        .sidebar-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            background-color: transparent;
            color: #8696a0;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
        }

        .sidebar-btn:hover {
            background-color: #2a3942;
            color: #e9edef;
        }

        .sidebar-btn.activo {
            background-color: #2a3942;
            color: #00a884;
        }

        .sidebar-spacer {
            flex: 1;
        }

        /* PANEL IZQUIERDO (lista de chats) */
        .panel-izquierdo {
            width: 340px;
            background-color: #111b21;
            border-right: 1px solid #2a3942;
            display: flex;
            flex-direction: column;
        }

        .header-izquierdo {
            padding: 10px 16px;
            background-color: #202c33;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .header-titulo {
            color: #e9edef;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #00a884;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .buscador {
            padding: 8px 12px;
            background-color: #111b21;
        }

        .buscador input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            background-color: #202c33;
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        .buscador input::placeholder {
            color: #8696a0;
        }

        .lista-chats {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #1f2c33;
            gap: 12px;
        }

        .chat-item:hover { background-color: #202c33; }
        .chat-item.activo { background-color: #2a3942; }

        .chat-info { flex: 1; overflow: hidden; }

        .chat-nombre {
            color: #e9edef;
            font-size: 0.95rem;
        }

        .chat-ultimo {
            color: #8696a0;
            font-size: 0.82rem;
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* PANEL DERECHO */
        .panel-derecho {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #0b141a;
        }

        .header-derecho {
            padding: 10px 16px;
            background-color: #202c33;
            display: flex;
            align-items: center;
            gap: 12px;
            height: 60px;
        }

        .contacto-nombre {
            color: #e9edef;
            font-size: 1rem;
            font-weight: bold;
        }

        .contacto-estado {
            color: #8696a0;
            font-size: 0.8rem;
        }

        .iconos-chat {
            margin-left: auto;
            display: flex;
            gap: 20px;
        }

        .iconos-chat span {
            color: #aebac1;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .area-mensajes {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .mensaje {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .mensaje.enviado {
            background-color: #005c4b;
            color: #e9edef;
            align-self: flex-end;
            border-radius: 8px 0px 8px 8px;
        }

        .mensaje.recibido {
            background-color: #202c33;
            color: #e9edef;
            align-self: flex-start;
            border-radius: 0px 8px 8px 8px;
        }

        .mensaje-hora {
            font-size: 0.7rem;
            color: #8696a0;
            text-align: right;
            margin-top: 4px;
        }

        .input-area {
            padding: 10px 16px;
            background-color: #202c33;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            background-color: #2a3942;
            color: white;
            outline: none;
            font-size: 0.95rem;
        }

        .input-area input::placeholder { color: #8696a0; }

        .btn-enviar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background-color: #00a884;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .btn-enviar:hover { background-color: #02c99e; }

        .pantalla-bienvenida {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #8696a0;
            gap: 16px;
        }

        .pantalla-bienvenida .icono { font-size: 80px; }

        .pantalla-bienvenida h2 {
            color: #e9edef;
            font-size: 1.5rem;
        }

        /* MODO CLARO */
        body.modo-claro { background-color: #f0f2f5; }
        body.modo-claro .sidebar { background-color: #f0f2f5; border-right-color: #d1d7db; }
        body.modo-claro .sidebar-btn { color: #54656f; }
        body.modo-claro .sidebar-btn:hover { background-color: #e9edef; color: #111b21; }
        body.modo-claro .panel-izquierdo { background-color: #ffffff; }
        body.modo-claro .header-izquierdo { background-color: #f0f2f5; }
        body.modo-claro .header-titulo { color: #111b21; }
        body.modo-claro .buscador { background-color: #ffffff; }
        body.modo-claro .buscador input { background-color: #f0f2f5; color: #111b21; }
        body.modo-claro .lista-chats { background-color: #ffffff; }
        body.modo-claro .chat-item { border-bottom-color: #f0f2f5; }
        body.modo-claro .chat-item:hover { background-color: #f5f6f6; }
        body.modo-claro .chat-item.activo { background-color: #f0f2f5; }
        body.modo-claro .chat-nombre { color: #111b21; }
        body.modo-claro .chat-ultimo { color: #667781; }
        body.modo-claro .panel-derecho { background-color: #efeae2; }
        body.modo-claro .header-derecho { background-color: #f0f2f5; }
        body.modo-claro .contacto-nombre { color: #111b21; }
        body.modo-claro .contacto-estado { color: #667781; }
        body.modo-claro .input-area { background-color: #f0f2f5; }
        body.modo-claro .input-area input { background-color: #ffffff; color: #111b21; }
        body.modo-claro .pantalla-bienvenida h2 { color: #111b21; }
        body.modo-claro .sidebar-divider { background-color: #d1d7db; }
    </style>
</head>

<body>
    <!-- BARRA LATERAL -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-avatar" id="sidebar-avatar" onclick="window.location.href='perfil.html'" title="Editar perfil">U</div>
        <div class="sidebar-divider"></div>
        <button class="sidebar-btn activo" title="Chats" onclick="">💬</button>
        <button class="sidebar-btn" title="Contactos" onclick="window.location.href='contactos.html'">👥</button>
        <button class="sidebar-btn" title="Configuración" onclick="window.location.href='configuracion.html'">⚙️</button>
        <div class="sidebar-spacer"></div>
        <button class="sidebar-btn" id="btn-modo" onclick="toggleModo()" title="Cambiar modo">🌙</button>
        <button class="sidebar-btn" title="Cerrar sesión" onclick="cerrarSesion()">🚪</button>
    </div>

    <!-- PANEL IZQUIERDO -->
    <div class="panel-izquierdo">
        <div class="header-izquierdo">
            <span class="header-titulo">Chats</span>
        </div>
        <div class="buscador">
            <input type="text" placeholder="🔍 Buscar contacto" id="input-buscar" oninput="buscarContacto()" />
        </div>
        <div class="lista-chats" id="lista-chats"></div>
    </div>

    <!-- PANEL DERECHO -->
    <div class="panel-derecho" id="panel-derecho">
        <div class="pantalla-bienvenida">
            <div class="icono">💬</div>
            <h2>Messenger App</h2>
            <p style="color:#8696a0">Selecciona un chat para comenzar</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js'
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js'
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js'

        const firebaseConfig = {
            apiKey: "AIzaSyCATFZ_YqRufmFkHrMyCyH25kK_0vxUjrA",
            authDomain: "messenger-app-b232a.firebaseapp.com",
            projectId: "messenger-app-b232a",
            storageBucket: "messenger-app-b232a.firebasestorage.app",
            messagingSenderId: "706161001993",
            appId: "1:706161001993:web:708e50c80a51c771e71ad8"
        }

        const app = initializeApp(firebaseConfig)
        const auth = getAuth(app)
        const db = getFirestore(app)

        let usuarioActual = null
        let chatActual = null
        let unsubscribeMensajes = null

        const contactos = [
            { nombre: "María García", email: "maria@test.com" },
            { nombre: "Juan Pérez", email: "juan@test.com" },
            { nombre: "Ana López", email: "ana@test.com" },
            { nombre: "Carlos Ruiz", email: "carlos@test.com" },
        ]

        // Aplicar modo guardado inmediatamente
        const modoGuardado = localStorage.getItem('modo') || 'oscuro'
        aplicarModo(modoGuardado)

        onAuthStateChanged(auth, (user) => {
            if (user) {
                usuarioActual = user
                document.getElementById('sidebar-avatar').textContent = user.email[0].toUpperCase()
                cargarContactos(contactos)
            } else {
                window.location.href = 'index.html'
            }
        })

        function cargarContactos(lista) {
            const contenedor = document.getElementById('lista-chats')
            contenedor.innerHTML = ''
            lista.forEach((c, i) => {
                const item = document.createElement('div')
                item.className = 'chat-item'
                item.id = `contacto-${i}`
                item.innerHTML = `
                    <div class="avatar">${c.nombre[0]}</div>
                    <div class="chat-info">
                        <div class="chat-nombre">${c.nombre}</div>
                        <div class="chat-ultimo">Haz clic para chatear</div>
                    </div>
                `
                item.onclick = () => abrirChat(c, i)
                contenedor.appendChild(item)
            })
        }

        window.buscarContacto = function () {
            const texto = document.getElementById('input-buscar').value.toLowerCase()
            const filtrados = contactos.filter(c => c.nombre.toLowerCase().includes(texto))
            cargarContactos(filtrados)
        }

        window.abrirChat = function (contacto, index) {
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('activo'))
            const item = document.getElementById(`contacto-${index}`)
            if (item) item.classList.add('activo')

            chatActual = [usuarioActual.email, contacto.email].sort().join('_')
            if (unsubscribeMensajes) unsubscribeMensajes()

            const panel = document.getElementById('panel-derecho')
            panel.innerHTML = `
                <div class="header-derecho">
                    <div class="avatar">${contacto.nombre[0]}</div>
                    <div>
                        <div class="contacto-nombre">${contacto.nombre}</div>
                        <div class="contacto-estado">en línea</div>
                    </div>
                    <div class="iconos-chat">
                        <span title="Buscar">🔍</span>
                        <span title="Configuración" onclick="window.location.href='configuracion.html'">⋮</span>
                    </div>
                </div>
                <div class="area-mensajes" id="area-mensajes"></div>
                <div class="input-area">
                    <input type="text" id="input-mensaje" placeholder="Escribe un mensaje" onkeypress="enviarConEnter(event)" />
                    <button class="btn-enviar" onclick="enviarMensaje()">➤</button>
                </div>
            `

            const q = query(collection(db, `chats/${chatActual}/mensajes`), orderBy('timestamp'))
            unsubscribeMensajes = onSnapshot(q, (snapshot) => {
                const area = document.getElementById('area-mensajes')
                if (!area) return
                area.innerHTML = ''
                snapshot.forEach(doc => {
                    const m = doc.data()
                    const tipo = m.remitente === usuarioActual.email ? 'enviado' : 'recibido'
                    const hora = m.timestamp ? new Date(m.timestamp.toDate()).toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' }) : ''
                    const div = document.createElement('div')
                    div.className = `mensaje ${tipo}`
                    div.innerHTML = `${m.texto}<div class="mensaje-hora">${hora}</div>`
                    area.appendChild(div)
                })
                area.scrollTop = area.scrollHeight
            })
        }

        window.enviarMensaje = async function () {
            const input = document.getElementById('input-mensaje')
            const texto = input.value.trim()
            if (!texto || !chatActual) return
            input.value = ''
            await addDoc(collection(db, `chats/${chatActual}/mensajes`), {
                texto,
                remitente: usuarioActual.email,
                timestamp: serverTimestamp()
            })
        }

        window.enviarConEnter = function (e) {
            if (e.key === 'Enter') enviarMensaje()
        }

        window.cerrarSesion = async function () {
            await signOut(auth)
            window.location.href = 'index.html'
        }

        window.toggleModo = function () {
            const modo = localStorage.getItem('modo') || 'oscuro'
            const nuevoModo = modo === 'oscuro' ? 'claro' : 'oscuro'
            localStorage.setItem('modo', nuevoModo)
            aplicarModo(nuevoModo)
        }

        function aplicarModo(modo) {
            const btn = document.getElementById('btn-modo')
            if (modo === 'claro') {
                document.body.classList.add('modo-claro')
                if (btn) btn.textContent = '☀️'
                if (btn) btn.title = 'Cambiar a modo oscuro'
            } else {
                document.body.classList.remove('modo-claro')
                if (btn) btn.textContent = '🌙'
                if (btn) btn.title = 'Cambiar a modo claro'
            }
        }
    </script>
</body>

</html>
