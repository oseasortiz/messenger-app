<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Messenger App - Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #111b21;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* PANEL IZQUIERDO */
        .panel-izquierdo {
            width: 380px;
            background-color: #111b21;
            border-right: 1px solid #2a3942;
            display: flex;
            flex-direction: column;
        }

        .header-izquierdo {
            padding: 10px 16px;
            background-color: #202c33;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #00a884;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .iconos-header {
            display: flex;
            gap: 20px;
        }

        .iconos-header span {
            color: #aebac1;
            font-size: 1.3rem;
            cursor: pointer;
        }

        .iconos-header span:hover {
            color: white;
        }

        .buscador {
            padding: 8px 12px;
            background-color: #111b21;
        }

        .buscador input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            background-color: #202c33;
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        .buscador input::placeholder {
            color: #8696a0;
        }

        .lista-chats {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #1f2c33;
            gap: 12px;
        }

        .chat-item:hover {
            background-color: #202c33;
        }

        .chat-item.activo {
            background-color: #2a3942;
        }

        .chat-info {
            flex: 1;
        }

        .chat-nombre {
            color: #e9edef;
            font-size: 0.95rem;
        }

        .chat-ultimo {
            color: #8696a0;
            font-size: 0.82rem;
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-hora {
            color: #8696a0;
            font-size: 0.75rem;
        }

        /* PANEL DERECHO */
        .panel-derecho {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #0b141a;
        }

        .header-derecho {
            padding: 10px 16px;
            background-color: #202c33;
            display: flex;
            align-items: center;
            gap: 12px;
            height: 60px;
        }

        .contacto-nombre {
            color: #e9edef;
            font-size: 1rem;
            font-weight: bold;
        }

        .contacto-estado {
            color: #8696a0;
            font-size: 0.8rem;
        }

        .iconos-chat {
            margin-left: auto;
            display: flex;
            gap: 20px;
        }

        .iconos-chat span {
            color: #aebac1;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .iconos-chat span:hover {
            color: white;
        }

        .area-mensajes {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .mensaje {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.4;
            position: relative;
        }

        .mensaje.enviado {
            background-color: #005c4b;
            color: #e9edef;
            align-self: flex-end;
            border-radius: 8px 0px 8px 8px;
        }

        .mensaje.recibido {
            background-color: #202c33;
            color: #e9edef;
            align-self: flex-start;
            border-radius: 0px 8px 8px 8px;
        }

        .mensaje-hora {
            font-size: 0.7rem;
            color: #8696a0;
            text-align: right;
            margin-top: 4px;
        }

        .input-area {
            padding: 10px 16px;
            background-color: #202c33;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            background-color: #2a3942;
            color: white;
            outline: none;
            font-size: 0.95rem;
        }

        .input-area input::placeholder {
            color: #8696a0;
        }

        .btn-enviar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background-color: #00a884;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-enviar:hover {
            background-color: #02c99e;
        }

        .pantalla-bienvenida {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #8696a0;
            gap: 16px;
        }

        .pantalla-bienvenida .icono {
            font-size: 80px;
        }

        .pantalla-bienvenida h2 {
            color: #e9edef;
            font-size: 1.5rem;
        }

        .pantalla-bienvenida p {
            font-size: 0.9rem;
            text-align: center;
            max-width: 300px;
        }
    </style>
</head>

<body>

    <!-- PANEL IZQUIERDO -->
    <div class="panel-izquierdo">
        <div class="header-izquierdo">
            <div class="avatar" id="mi-avatar">U</div>
            <div class="iconos-header">
                <span title="Nuevo chat">💬</span>
                <span title="Menú">⋮</span>
            </div>
        </div>

        <div class="buscador">
            <input type="text" placeholder="🔍 Buscar o empezar un chat" />
        </div>

        <div class="lista-chats" id="lista-chats">
            <!-- Los contactos aparecerán aquí -->
        </div>
    </div>

    <!-- PANEL DERECHO -->
    <div class="panel-derecho" id="panel-derecho">
        <div class="pantalla-bienvenida">
            <div class="icono">💬</div>
            <h2>Messenger App</h2>
            <p>Selecciona un chat para comenzar a conversar</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js'
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js'

        const firebaseConfig = {
            apiKey: "AIzaSyCATFZ_YqRufmFkHrMyCyH25kK_0vxUjrA",
            authDomain: "messenger-app-b232a.firebaseapp.com",
            projectId: "messenger-app-b232a",
            storageBucket: "messenger-app-b232a.firebasestorage.app",
            messagingSenderId: "706161001993",
            appId: "1:706161001993:web:708e50c80a51c771e71ad8"
        }

        const app = initializeApp(firebaseConfig)
        const auth = getAuth(app)

        // Verificar si el usuario está logueado
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const inicial = user.email[0].toUpperCase()
                document.getElementById('mi-avatar').textContent = inicial
                cargarContactos()
            } else {
                window.location.href = 'index.html'
            }
        })

        // Contactos de ejemplo por ahora
        function cargarContactos() {
            const contactos = [
                { nombre: "María García", ultimo: "Hola, ¿cómo estás?", hora: "10:30" },
                { nombre: "Juan Pérez", ultimo: "¿Nos vemos mañana?", hora: "09:15" },
                { nombre: "Ana López", ultimo: "Perfecto, gracias!", hora: "Ayer" },
                { nombre: "Carlos Ruiz", ultimo: "Ok, te llamo luego", hora: "Ayer" },
            ]

            const lista = document.getElementById('lista-chats')
            lista.innerHTML = ''

            contactos.forEach((c, i) => {
                const item = document.createElement('div')
                item.className = 'chat-item'
                item.innerHTML = `
          <div class="avatar">${c.nombre[0]}</div>
          <div class="chat-info">
            <div class="chat-nombre">${c.nombre}</div>
            <div class="chat-ultimo">${c.ultimo}</div>
          </div>
          <div class="chat-hora">${c.hora}</div>
        `
                item.onclick = () => abrirChat(c.nombre, i)
                lista.appendChild(item)
            })
        }

        // Mensajes de ejemplo
        const mensajesEjemplo = [
            { texto: "Hola, ¿cómo estás?", tipo: "recibido", hora: "10:28" },
            { texto: "Muy bien gracias! ¿Y tú?", tipo: "enviado", hora: "10:29" },
            { texto: "También bien, gracias por preguntar 😊", tipo: "recibido", hora: "10:30" },
        ]

        window.abrirChat = function (nombre, index) {
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('activo'))
            document.querySelectorAll('.chat-item')[index].classList.add('activo')

            const panel = document.getElementById('panel-derecho')
            panel.innerHTML = `
        <div class="header-derecho">
          <div class="avatar">${nombre[0]}</div>
          <div>
            <div class="contacto-nombre">${nombre}</div>
            <div class="contacto-estado">en línea</div>
          </div>
          <div class="iconos-chat">
            <span title="Llamada">🔍</span>
            <span title="Menú">⋮</span>
          </div>
        </div>
        <div class="area-mensajes" id="area-mensajes">
        </div>
        <div class="input-area">
          <input type="text" id="input-mensaje" placeholder="Escribe un mensaje" onkeypress="enviarConEnter(event)" />
          <button class="btn-enviar" onclick="enviarMensaje()">➤</button>
        </div>
      `

            const area = document.getElementById('area-mensajes')
            mensajesEjemplo.forEach(m => agregarMensaje(m.texto, m.tipo, m.hora))
        }

        window.enviarMensaje = function () {
            const input = document.getElementById('input-mensaje')
            const texto = input.value.trim()
            if (!texto) return
            const hora = new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' })
            agregarMensaje(texto, 'enviado', hora)
            input.value = ''
        }

        window.enviarConEnter = function (e) {
            if (e.key === 'Enter') enviarMensaje()
        }

        function agregarMensaje(texto, tipo, hora) {
            const area = document.getElementById('area-mensajes')
            if (!area) return
            const div = document.createElement('div')
            div.className = `mensaje ${tipo}`
            div.innerHTML = `${texto}<div class="mensaje-hora">${hora}</div>`
            area.appendChild(div)
            area.scrollTop = area.scrollHeight
        }
    </script>
</body>

</html>
