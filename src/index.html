<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Messenger App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #111b21;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background-color: #202c33;
            padding: 40px;
            border-radius: 12px;
            width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 50px;
        }

        h1 {
            color: white;
            font-size: 1.5rem;
        }

        p.subtitulo {
            color: #8696a0;
            font-size: 0.85rem;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            background-color: #2a3942;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus {
            border: 1px solid #00a884;
        }

        input::placeholder {
            color: #8696a0;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #00a884;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-login:hover {
            background-color: #02c99e;
        }

        .links {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .links a {
            color: #00a884;
            font-size: 0.85rem;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .divider {
            width: 100%;
            height: 1px;
            background-color: #2a3942;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo">💬</div>
        <h1>Messenger App</h1>
        <p class="subtitulo">Inicia sesión para continuar</p>

        <div class="divider"></div>

        <input type="email" id="correo" placeholder="Correo electrónico" />
        <input type="password" id="contrasena" placeholder="Contraseña" />

        <button class="btn-login" onclick="iniciarSesion()">Iniciar Sesión</button>

        <div class="links">
            <a href="#">¿Olvidaste tu contraseña?</a>
            <a href="#">¿No tienes cuenta? Regístrate</a>
        </div>
    </div>

    <script>
        function iniciarSesion() {
            const correo = document.getElementById('correo').value
            const contrasena = document.getElementById('contrasena').value

            if (correo === '' || contrasena === '') {
                alert('Por favor completa todos los campos')
                return
            }

            alert('¡Bienvenido! Pronto conectaremos esto con Firebase')
        }
    </script>
</body>

</html>
