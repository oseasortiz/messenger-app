<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Messenger App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #111b21;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background-color: #202c33;
            padding: 40px;
            border-radius: 12px;
            width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 50px;
        }

        h1 {
            color: white;
            font-size: 1.5rem;
        }

        p.subtitulo {
            color: #8696a0;
            font-size: 0.85rem;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            background-color: #2a3942;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus {
            border: 1px solid #00a884;
        }

        input::placeholder {
            color: #8696a0;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #00a884;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-login:hover {
            background-color: #02c99e;
        }

        .btn-registro {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: #00a884;
            border: 1px solid #00a884;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-registro:hover {
            background-color: #2a3942;
        }

        .links a {
            color: #00a884;
            font-size: 0.85rem;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .divider {
            width: 100%;
            height: 1px;
            background-color: #2a3942;
        }

        .mensaje {
            font-size: 0.85rem;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
        }

        .error {
            background-color: #3d1515;
            color: #ff6b6b;
        }

        .exito {
            background-color: #153d2a;
            color: #00a884;
        }

        #mensaje-estado {
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo">💬</div>
        <h1>Messenger App</h1>
        <p class="subtitulo">Inicia sesión para continuar</p>
        <div class="divider"></div>
        <input type="email" id="correo" placeholder="Correo electrónico" />
        <input type="password" id="contrasena" placeholder="Contraseña" />
        <div id="mensaje-estado" class="mensaje"></div>
        <button class="btn-login" onclick="iniciarSesion()">Iniciar Sesión</button>
        <button class="btn-registro" onclick="registrarse()">Crear cuenta nueva</button>
        <div class="links">
            <a href="#" onclick="recuperarContrasena()">¿Olvidaste tu contraseña?</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js'
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js'

        const firebaseConfig = {
            apiKey: "AIzaSyCATFZ_YqRufmFkHrMyCyH25kK_0vxUjrA",
            authDomain: "messenger-app-b232a.firebaseapp.com",
            projectId: "messenger-app-b232a",
            storageBucket: "messenger-app-b232a.firebasestorage.app",
            messagingSenderId: "706161001993",
            appId: "1:706161001993:web:708e50c80a51c771e71ad8"
        }

        const app = initializeApp(firebaseConfig)
        const auth = getAuth(app)

        function mostrarMensaje(texto, tipo) {
            const el = document.getElementById('mensaje-estado')
            el.textContent = texto
            el.className = `mensaje ${tipo}`
            el.style.display = 'block'
        }

        window.iniciarSesion = async function () {
            const correo = document.getElementById('correo').value
            const contrasena = document.getElementById('contrasena').value
            if (!correo || !contrasena) { mostrarMensaje('Por favor completa todos los campos', 'error'); return }
            try {
                await signInWithEmailAndPassword(auth, correo, contrasena)
                mostrarMensaje('¡Bienvenido! Cargando...', 'exito')
                setTimeout(() => { window.location.href = 'chat.html' }, 1000)
            } catch (e) {
                mostrarMensaje('Correo o contraseña incorrectos', 'error')
            }
        }

        window.registrarse = async function () {
            const correo = document.getElementById('correo').value
            const contrasena = document.getElementById('contrasena').value
            if (!correo || !contrasena) { mostrarMensaje('Por favor completa todos los campos', 'error'); return }
            if (contrasena.length < 6) { mostrarMensaje('La contraseña debe tener al menos 6 caracteres', 'error'); return }
            try {
                await createUserWithEmailAndPassword(auth, correo, contrasena)
                mostrarMensaje('¡Cuenta creada exitosamente!', 'exito')
            } catch (e) {
                mostrarMensaje('Error al crear cuenta. El correo ya existe.', 'error')
            }
        }

        window.recuperarContrasena = async function () {
            const correo = document.getElementById('correo').value
            if (!correo) { mostrarMensaje('Escribe tu correo primero', 'error'); return }
            try {
                await sendPasswordResetEmail(auth, correo)
                mostrarMensaje('¡Correo de recuperación enviado!', 'exito')
            } catch (e) {
                mostrarMensaje('Error al enviar correo de recuperación', 'error')
            }
        }
    </script>
</body>

</html>
