<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Mi Perfil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #111b21;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #202c33;
            padding: 40px;
            border-radius: 12px;
            width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: white;
            font-size: 1.4rem;
        }

        .avatar-grande {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #00a884;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            position: relative;
        }

        .avatar-grande:hover::after {
            content: '✏️';
            position: absolute;
            bottom: 0;
            right: 0;
            font-size: 1.2rem;
        }

        .campo {
            width: 100%;
        }

        .campo label {
            color: #00a884;
            font-size: 0.8rem;
            margin-bottom: 4px;
            display: block;
        }

        .campo input,
        .campo textarea {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            background-color: #2a3942;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }

        .campo textarea {
            resize: none;
            height: 80px;
            font-family: Arial, sans-serif;
        }

        .campo input:focus,
        .campo textarea:focus {
            border: 1px solid #00a884;
        }

        .campo input::placeholder,
        .campo textarea::placeholder {
            color: #8696a0;
        }

        .divider {
            width: 100%;
            height: 1px;
            background-color: #2a3942;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-primary {
            background-color: #00a884;
            color: white;
        }

        .btn-primary:hover {
            background-color: #02c99e;
        }

        .btn-secondary {
            background-color: transparent;
            color: #00a884;
            border: 1px solid #00a884;
        }

        .btn-secondary:hover {
            background-color: #2a3942;
        }

        .mensaje {
            font-size: 0.85rem;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            display: none;
            width: 100%;
        }

        .error {
            background-color: #3d1515;
            color: #ff6b6b;
        }

        .exito {
            background-color: #153d2a;
            color: #00a884;
        }

        .email-texto {
            color: #8696a0;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>✏️ Editar Perfil</h1>
        <div class="avatar-grande" id="avatar">U</div>
        <p class="email-texto" id="email-usuario"></p>
        <div class="divider"></div>

        <div class="campo">
            <label>Tu nombre</label>
            <input type="text" id="nombre" placeholder="Escribe tu nombre" />
        </div>

        <div class="campo">
            <label>Info / Estado</label>
            <textarea id="estado" placeholder="Ej: Hola, estoy usando Messenger App"></textarea>
        </div>

        <div id="mensaje-estado" class="mensaje"></div>

        <button class="btn btn-primary" onclick="guardarPerfil()">Guardar cambios</button>
        <button class="btn btn-secondary" onclick="window.location.href='chat.html'">← Volver al chat</button>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js'
        import { getAuth, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js'
        import { getFirestore, doc, getDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js'

        const firebaseConfig = {
            apiKey: "AIzaSyCATFZ_YqRufmFkHrMyCyH25kK_0vxUjrA",
            authDomain: "messenger-app-b232a.firebaseapp.com",
            projectId: "messenger-app-b232a",
            storageBucket: "messenger-app-b232a.firebasestorage.app",
            messagingSenderId: "706161001993",
            appId: "1:706161001993:web:708e50c80a51c771e71ad8"
        }

        const app = initializeApp(firebaseConfig)
        const auth = getAuth(app)
        const db = getFirestore(app)

        function mostrarMensaje(texto, tipo) {
            const el = document.getElementById('mensaje-estado')
            el.textContent = texto
            el.className = `mensaje ${tipo}`
            el.style.display = 'block'
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'index.html'; return }

            document.getElementById('email-usuario').textContent = user.email
            document.getElementById('avatar').textContent = user.email[0].toUpperCase()

            const docRef = doc(db, 'usuarios', user.uid)
            const docSnap = await getDoc(docRef)

            if (docSnap.exists()) {
                const datos = docSnap.data()
                document.getElementById('nombre').value = datos.nombre || ''
                document.getElementById('estado').value = datos.estado || ''
                if (datos.nombre) {
                    document.getElementById('avatar').textContent = datos.nombre[0].toUpperCase()
                }
            }
        })

        window.guardarPerfil = async function () {
            const nombre = document.getElementById('nombre').value.trim()
            const estado = document.getElementById('estado').value.trim()

            if (!nombre) { mostrarMensaje('El nombre no puede estar vacío', 'error'); return }

            try {
                const user = auth.currentUser
                await updateProfile(user, { displayName: nombre })
                const { setDoc } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js')
                await setDoc(doc(db, 'usuarios', user.uid), {
                    nombre: nombre,
                    estado: estado,
                    email: user.email
                }, { merge: true })
                document.getElementById('avatar').textContent = nombre[0].toUpperCase()
                mostrarMensaje('¡Perfil actualizado correctamente!', 'exito')
            } catch (e) {
                mostrarMensaje('Error al guardar los cambios', 'error')
            }
        }
    </script>
</body>

</html>
