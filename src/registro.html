<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Crear cuenta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #111b21;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #202c33;
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: 50px;
        }

        h1 {
            color: white;
            font-size: 1.5rem;
        }

        p.subtitulo {
            color: #8696a0;
            font-size: 0.85rem;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            background-color: #2a3942;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus {
            border: 1px solid #00a884;
        }

        input::placeholder {
            color: #8696a0;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-primary {
            background-color: #00a884;
            color: white;
        }

        .btn-primary:hover {
            background-color: #02c99e;
        }

        .btn-secondary {
            background-color: transparent;
            color: #00a884;
            border: 1px solid #00a884;
        }

        .btn-secondary:hover {
            background-color: #2a3942;
        }

        .divider {
            width: 100%;
            height: 1px;
            background-color: #2a3942;
        }

        .mensaje {
            font-size: 0.85rem;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            display: none;
            width: 100%;
        }

        .error {
            background-color: #3d1515;
            color: #ff6b6b;
        }

        .exito {
            background-color: #153d2a;
            color: #00a884;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">👤</div>
        <h1>Crear cuenta</h1>
        <p class="subtitulo">Completa tus datos para registrarte</p>
        <div class="divider"></div>
        <input type="text" id="nombre" placeholder="Nombre completo" />
        <input type="email" id="correo" placeholder="Correo electrónico" />
        <input type="password" id="contrasena" placeholder="Contraseña (mín. 6 caracteres)" />
        <input type="password" id="confirmar" placeholder="Confirmar contraseña" />
        <div id="mensaje-estado" class="mensaje"></div>
        <button class="btn btn-primary" onclick="registrarse()">Crear cuenta</button>
        <button class="btn btn-secondary" onclick="window.location.href='index.html'">Ya tengo cuenta</button>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js'
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js'
        import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js'

        const firebaseConfig = {
            apiKey: "AIzaSyCATFZ_YqRufmFkHrMyCyH25kK_0vxUjrA",
            authDomain: "messenger-app-b232a.firebaseapp.com",
            projectId: "messenger-app-b232a",
            storageBucket: "messenger-app-b232a.firebasestorage.app",
            messagingSenderId: "706161001993",
            appId: "1:706161001993:web:708e50c80a51c771e71ad8"
        }

        const app = initializeApp(firebaseConfig)
        const auth = getAuth(app)
        const db = getFirestore(app)

        function mostrarMensaje(texto, tipo) {
            const el = document.getElementById('mensaje-estado')
            el.textContent = texto
            el.className = `mensaje ${tipo}`
            el.style.display = 'block'
        }

        window.registrarse = async function () {
            const nombre = document.getElementById('nombre').value.trim()
            const correo = document.getElementById('correo').value.trim()
            const contrasena = document.getElementById('contrasena').value
            const confirmar = document.getElementById('confirmar').value

            if (!nombre || !correo || !contrasena || !confirmar) {
                mostrarMensaje('Por favor completa todos los campos', 'error'); return
            }
            if (contrasena.length < 6) {
                mostrarMensaje('La contraseña debe tener al menos 6 caracteres', 'error'); return
            }
            if (contrasena !== confirmar) {
                mostrarMensaje('Las contraseñas no coinciden', 'error'); return
            }

            try {
                const resultado = await createUserWithEmailAndPassword(auth, correo, contrasena)
                await updateProfile(resultado.user, { displayName: nombre })
                await setDoc(doc(db, 'usuarios', resultado.user.uid), {
                    nombre: nombre,
                    email: correo,
                    foto: '',
                    estado: 'Hola, estoy usando Messenger App',
                    creado: new Date().toISOString()
                })
                mostrarMensaje('¡Cuenta creada exitosamente!', 'exito')
                setTimeout(() => { window.location.href = 'chat.html' }, 1500)
            } catch (e) {
                mostrarMensaje('Error: El correo ya está registrado', 'error')
            }
        }
    </script>
</body>

</html>
